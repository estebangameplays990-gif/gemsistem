<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Gemsistem</title>
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-primary)">
<div class="login-box">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Gemsistem" style="width:100px;display:block;margin:0 auto 20px">
    <h2 style="text-align:center;color:var(--accent);margin-bottom:8px">Panel Admin</h2>
    <p style="text-align:center;color:var(--text-secondary);margin-bottom:30px;font-size:.9rem">Solo acceso autorizado</p>
    
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for cat, msg in messages %}
    <div class="flash flash-{{ cat }}" style="margin-bottom:16px">{{ msg }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" name="email" required placeholder="admin@gemsistem.com">
        </div>
        <div class="form-group">
            <label>Contraseña</label>
            <input type="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-submit" style="width:100%">🔐 Ingresar</button>
    </form>
    <div style="text-align:center;margin-top:20px">
        <a href="{{ url_for('index') }}" style="color:var(--text-secondary);font-size:.85rem">← Volver a la tienda</a>
    </div>
</div>
</body>
</html>
